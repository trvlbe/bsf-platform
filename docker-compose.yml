services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bsf_platform
      POSTGRES_USER: bsf
      POSTGRES_PASSWORD: bsf_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsf -d bsf_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://bsf:bsf_dev@postgres:5432/bsf_platform
      PORT: 4001
      FRONTEND_URL: http://localhost:5174
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  postgres_data:
